<div class="container mt-4">
  <h2>Modifier une permission</h2>

  <div *ngIf="erreur" class="alert alert-danger">{{ erreur }}</div>
  <div *ngIf="succes" class="alert alert-success">{{ succes }}</div>

  <div *ngIf="!permission" class="text-center mt-5">
    <div class="spinner-border text-primary"></div>
    <p class="mt-2">Chargement...</p>
  </div>

  <div *ngIf="permission" class="card shadow p-4">

    <div class="mb-3">
      <label class="form-label">Nom de la permission *</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="permission.nom"
        placeholder="Ex: TACHE_READ"
      />
    </div>

    <div class="mb-3">
      <label class="form-label">Description</label>
      <input
        type="text"
        class="form-control"
        [(ngModel)]="permission.description"
        placeholder="Description de la permission"
      />
    </div>

    <div class="d-flex gap-2 mt-3">
      <button
        class="btn btn-success"
        (click)="confirmer()"
        [disabled]="chargement">
        <span *ngIf="chargement" class="spinner-border spinner-border-sm me-2"></span>
        {{ chargement ? 'Enregistrement...' : '✔ Confirmer la modification' }}
      </button>
      <button class="btn btn-secondary" (click)="annuler()">
        ✖ Annuler
      </button>
    </div>

  </div>
</div>
