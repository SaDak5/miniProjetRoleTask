<div class="container mt-4">
  <h2>Modifier une tâche</h2>

  <div *ngIf="!authService.hasPermission('TACHE_UPDATE')" class="alert alert-danger text-center">
    <h4>⛔ Accès non autorisé</h4>
    <p>Vous n'avez pas les droits pour modifier une tâche.</p>
    <a routerLink="/taches" class="btn btn-primary">Retour à la liste des tâches</a>
  </div>

  <ng-container *ngIf="authService.hasPermission('TACHE_UPDATE')">
    
    <div *ngIf="erreur" class="alert alert-danger">{{ erreur }}</div>
    <div *ngIf="succes" class="alert alert-success">{{ succes }}</div>

    <div *ngIf="!tache" class="text-center mt-5">
      <div class="spinner-border text-primary"></div>
      <p class="mt-2">Chargement de la tâche...</p>
    </div>

    <div *ngIf="tache" class="card shadow p-4">

      <div class="mb-3">
        <label class="form-label">Nom de la tâche *</label>
        <input type="text" class="form-control" [(ngModel)]="tache.nomDuTache" placeholder="Ex: Réunion hebdomadaire" />
      </div>

      <!-- ✅ Type de tâche avec option "AUTRE" -->
      <div class="mb-3">
        <label class="form-label">Type de tâche *</label>
        <select class="form-select" [(ngModel)]="tache.typeTache" (change)="onTypeChange()">
          <option *ngFor="let type of typesTache" [value]="type">
            {{ type === 'AUTRE' ? 'Autre...' : type }}
          </option>
        </select>
      </div>

      <!-- ✅ Champ "AUTRE" qui apparaît dynamiquement -->
      <div class="mb-3" *ngIf="showAutreInput">
        <label class="form-label">Précisez le type de tâche *</label>
        <input type="text" class="form-control" [(ngModel)]="autreTypeValue" placeholder="Ex: FORMATION, MAINTENANCE, LIVRAISON..." />
        <small class="text-muted">Saisissez le type de tâche personnalisé</small>
      </div>

      <div class="mb-3">
        <label class="form-label">Date *</label>
        <input type="date" class="form-control" [(ngModel)]="tache.dateTache" />
      </div>

      <div class="mb-3">
        <label class="form-label">Période (en heures) *</label>
        <input type="number" class="form-control" [(ngModel)]="tache.periodeTache" min="1" />
      </div>

      <div class="mb-3">
        <label class="form-label">Assignée à</label>
        <input type="text" class="form-control" [value]="tache.utilisateur?.prenom + ' ' + tache.utilisateur?.nom + ' (' + tache.utilisateur?.email + ')'" disabled />
        <small class="text-muted">La tâche reste assignée à l'utilisateur qui l'a créée.</small>
      </div>

      <div class="d-flex gap-2 mt-3">
        <button class="btn btn-success" (click)="confirmer()" [disabled]="chargement">
          <span *ngIf="chargement" class="spinner-border spinner-border-sm me-2"></span>
          {{ chargement ? 'Enregistrement...' : '✔ Confirmer la modification' }}
        </button>
        <button class="btn btn-secondary" (click)="annuler()">✖ Annuler</button>
      </div>

    </div>

  </ng-container>
</div>
