<div class="main-content p-4">
  <div class="container-fluid">

    <div class="header-section mb-4">
      <h2 class="fw-bold text-dark">Gestion des Permissions</h2>
      <p class="text-muted">Configurer et tester les accès du système.</p>
    </div>

    <div class="card border-0 shadow-sm overflow-hidden">
      <div class="table-responsive">
        <table class="table mb-0 align-middle">
          <thead class="bg-light">
            <tr>
              <th class="ps-4">ID</th>
              <th>Nom</th>
              <th>Description</th>
              <th class="text-center">Test</th>
              <th class="text-end pe-4">Actions</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let p of permissions" class="permission-row">

              <td class="ps-4 fw-semibold text-muted">
                #{{ p.id }}
              </td>

              <td>
                <span class="badge-permission">
                  {{ p.nom }}
                </span>
              </td>

              <td class="text-secondary">
                {{ p.description || 'Aucune description' }}
              </td>

              <td class="text-center">
                <button class="btn btn-sm btn-outline-primary"
                        (click)="executerPermission(p.nom)">
                  Tester
                </button>
              </td>

              <td class="text-end pe-4">
                <button class="btn-action edit me-2"
                        [routerLink]="['/update-permission', p.id]">
                  ✏️
                </button>

                <button class="btn-action delete"
                        (click)="supprimerPermission(p)">
                  🗑️
                </button>
              </td>

            </tr>
          </tbody>
        </table>
      </div>

      <div class="card-footer bg-white text-end">
        <small class="text-muted">
          {{ permissions.length }} permissions au total
        </small>
      </div>
    </div>

    <!-- Console -->
    <div *ngIf="resultat" class="console-box mt-4">
      <div class="console-header d-flex justify-content-between">
        <span>Résultat : <strong>{{ resultatTitre }}</strong></span>
        <button class="close-btn" (click)="resultat = null">✖</button>
      </div>

      <div class="console-body">
        <pre>{{ resultat | json }}</pre>
      </div>
    </div>

  </div>
</div>
