<div class="login-container">

  <div class="login-card">

    <!-- Avatar -->
    <div class="avatar">
      <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="avatar">
    </div>

    <h3 class="title">Connexion</h3>

    <div *ngIf="erreur" class="alert alert-danger">
      {{ erreur }}
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="saisir votre email">
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="motDePasse" placeholder="••••">
    </div>

    <button (click)="login()" [disabled]="chargement">
      <span *ngIf="chargement" class="loader"></span>
      {{ chargement ? 'Connexion...' : 'Se connecter' }}
    </button>

    <p class="register">
      Pas encore de compte ?
      <a href="/register">S'inscrire</a>
    </p>

  </div>

</div>
