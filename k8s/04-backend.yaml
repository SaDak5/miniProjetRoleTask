apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: roletask
spec:
  replicas: 3
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: sadokaziz/roletask-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8094
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/roletask_db?createDatabaseIfNotExist=true
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: roletask-secrets
                  key: MYSQL_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: roletask-secrets
                  key: MYSQL_PASSWORD
            - name: SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: roletask-config
                  key: SERVER_PORT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: roletask-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: roletask
spec:
  selector:
    app: backend
  ports:
    - port: 8094
      targetPort: 8094
  type: ClusterIP